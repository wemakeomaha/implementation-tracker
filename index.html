<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Omaha Progress Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <script src="./vendor/tailwindcss-cdn.js"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              civic: {
                ink: "#111111",
                muted: "#58595B",
                blue: "#111111",
                sky: "#FA4F1E",
                green: "#39C1A1",
                gold: "#F1BD51",
                red: "#620603",
                cream: "#f3f0e7",
                line: "#d8d2c4",
                sisal: "#D1CBBB",
                orange: "#FA4F1E",
                slate: "#58595B",
                parks: "#39C1A1",
                land: "#7A8F19",
                health: "#7578E6",
                arts: "#9B2D92",
                economy: "#006057",
                natural: "#F1BD51",
                housing: "#7C9BA9",
                mobility: "#0441BE",
                peach: "#FFBE9A"
              }
            },
            boxShadow: {
              civic: "0 18px 45px rgba(17, 17, 17, 0.07)"
            },
            fontFamily: {
              sans: ["Montserrat", "ui-sans-serif", "system-ui", "Segoe UI", "Arial", "sans-serif"]
            }
          }
        }
      };
    </script>
    <script src="./vendor/react.production.min.js"></script>
    <script src="./vendor/react-dom.production.min.js"></script>
    <script src="./vendor/babel.min.js"></script>
    <style>
      html { scroll-behavior: smooth; }
      body {
        color: #111111;
        background: #fbfaf7;
        min-height: 100vh;
        position: relative;
      }
      body::before {
        background-image: url("./assets/wmo-pattern.jpg");
        background-position: top left;
        background-repeat: repeat;
        background-size: 360px auto;
        content: "";
        inset: 0;
        opacity: 0.015;
        pointer-events: none;
        position: fixed;
        z-index: -2;
      }
      body::after {
        background:
          radial-gradient(circle, transparent 0 30%, rgba(250, 79, 30, 0.16) 31% 34%, transparent 35%),
          repeating-conic-gradient(from 8deg, rgba(98, 6, 3, 0.12) 0deg 4deg, transparent 4deg 9deg);
        border-radius: 9999px;
        content: "";
        height: 760px;
        left: -280px;
        opacity: 0.035;
        pointer-events: none;
        position: absolute;
        top: 48%;
        width: 760px;
        z-index: -1;
      }
      #root {
        isolation: isolate;
      }
      .map-grid {
        background-image:
          linear-gradient(rgba(98, 6, 3, 0.13) 1px, transparent 1px),
          linear-gradient(90deg, rgba(98, 6, 3, 0.13) 1px, transparent 1px);
        background-size: 44px 44px;
      }
      .focus-ring:focus { outline: 3px solid rgba(250, 79, 30, 0.35); outline-offset: 2px; }
      .brand-panel {
        position: relative;
        overflow: hidden;
      }
      .brand-panel::after {
        background:
          radial-gradient(circle, transparent 0 28%, rgba(250, 79, 30, 0.24) 29% 32%, transparent 33%),
          repeating-conic-gradient(from 0deg, rgba(98, 6, 3, 0.16) 0deg 4deg, transparent 4deg 10deg);
        border-radius: 9999px;
        content: "";
        height: 420px;
        opacity: 0.22;
        pointer-events: none;
        position: absolute;
        right: -160px;
        top: -170px;
        width: 420px;
      }
    </style>
  </head>
  <body class="text-civic-ink antialiased">
    <div id="root"></div>
    <script type="text/babel">
      const { useEffect, useMemo, useState } = React;

      const navItems = [
        ["Home", "overview"],
        ["Implementation Tracker", "implementation"],
        ["Indicators Dashboard", "indicators"],
        ["Investment Map", "investments"],
        ["Annual Reports", "reports"],
        ["Data & Methods", "methods"]
      ];

      const goals = [
        { name: "Land Use & Built Form", desc: "Directs growth toward centers, corridors, and existing infrastructure." },
        { name: "Housing", desc: "Expands housing types, affordability, and neighborhood stability." },
        { name: "Mobility", desc: "Improves safe, connected access to transit, jobs, schools, parks, and daily needs." },
        { name: "Economic Development", desc: "Supports jobs, corridors, small businesses, and workforce pathways." },
        { name: "Sustainability & Resiliency", desc: "Protects natural systems like native habitat, green spaces, waterways, and air quality, while expanding parks, trails, and climate resilience." },
        { name: "Arts & Culture", desc: "Explores the connections between our growth and development with the arts, the many cultures represented by Omahans, and our rich history." },
        { name: "Fiscal Sustainability", desc: "Tracks whether growth patterns support efficient public services and infrastructure." },
        { name: "Public Health", desc: "Tracks access to healthy environments, daily needs, safe streets, and community wellbeing." }
      ];

      const goalStyles = {
        "Land Use & Built Form": { color: "#7A8F19", tint: "rgba(122, 143, 25, 0.11)" },
        "Housing": { color: "#7C9BA9", tint: "rgba(124, 155, 169, 0.16)" },
        "Mobility": { color: "#0441BE", tint: "rgba(4, 65, 190, 0.10)" },
        "Economic Development": { color: "#006057", tint: "rgba(0, 96, 87, 0.11)" },
        "Sustainability & Resiliency": { color: "#39C1A1", tint: "rgba(57, 193, 161, 0.13)" },
        "Arts & Culture": { color: "#9B2D92", tint: "rgba(155, 45, 146, 0.10)" },
        "Fiscal Sustainability": { color: "#F1BD51", tint: "rgba(241, 189, 81, 0.18)" },
        "Public Health": { color: "#7578E6", tint: "rgba(117, 120, 230, 0.13)" }
      };

      const goalStyle = name => goalStyles[name] || { color: "#620603", tint: "rgba(209, 203, 187, 0.28)" };

      const actions = [
        {
          title: "Update zoning regulations to support mixed-use development along priority corridors.",
          status: "In Progress",
          department: "Planning",
          timeframe: "Short-term",
          goal: "Land Use & Built Form",
          indicators: ["Growth in Centers and Corridors", "Infill Development"],
          funding: "Funded"
        },
        {
          title: "Expand sidewalk connections near schools, parks, and transit stops.",
          status: "Ongoing",
          department: "Public Works",
          timeframe: "Medium-term",
          goal: "Mobility",
          indicators: ["Households within a 15-Minute Walk of Transit", "Non-Auto Trip Share"],
          funding: "Partially Funded"
        },
        {
          title: "Create a housing strategy to support missing-middle and affordable housing.",
          status: "Completed",
          department: "Housing and Community Development",
          timeframe: "Short-term",
          goal: "Housing",
          indicators: ["Middle Housing Share", "Housing Cost Burden"],
          funding: "Funded"
        },
        {
          title: "Prioritize infrastructure investment in historically underserved neighborhoods.",
          status: "In Progress",
          department: "Mayor's Office",
          timeframe: "Medium-term",
          goal: "Economic Development",
          indicators: ["Public Investment in Historically Underserved Areas", "Infrastructure Projects in Priority Areas"],
          funding: "Partially Funded"
        },
        {
          title: "Develop a citywide small business and corridor reinvestment program.",
          status: "Not Started",
          department: "Economic Development Task Force",
          timeframe: "Medium-term",
          goal: "Economic Development",
          indicators: ["Jobs Near Transit", "Youth Job Pathway Opportunities"],
          funding: "Unfunded"
        },
        {
          title: "Improve access to parks, trails, and public gathering spaces.",
          status: "Ongoing",
          department: "Parks, Recreation and Public Property",
          timeframe: "Long-term",
          goal: "Sustainability & Resiliency",
          indicators: ["Households within a 15-Minute Walk of Parks or Trails", "Tree Canopy Coverage"],
          funding: "Funded"
        },
        {
          title: "Align capital improvement planning with comprehensive plan priorities.",
          status: "Delayed",
          department: "Finance",
          timeframe: "Short-term",
          goal: "Fiscal Sustainability",
          indicators: ["Infrastructure Cost per New Household or Job", "Value per Acre"],
          funding: "Partially Funded"
        }
      ];

      const sourceForIndicator = (goal, name) => {
        if (name.includes("Transit") || name.includes("Trip") || name.includes("Vehicle") || name.includes("Routes")) return "City transportation and transit datasets";
        if (name.includes("Housing") || name.includes("Density") || name.includes("Unit") || name.includes("Cost Burden")) return "Housing, parcel, and census datasets";
        if (name.includes("Investment") || name.includes("Projects") || name.includes("Infrastructure")) return "Capital improvement and budget records";
        if (name.includes("Tree") || name.includes("Impervious") || name.includes("Flood") || name.includes("Air Quality")) return "Environmental and resilience datasets";
        if (name.includes("Jobs") || name.includes("Wage") || name.includes("Business") || name.includes("Pathway")) return "Economic development and workforce datasets";
        if (name.includes("Development") || name.includes("Land") || name.includes("Greenfield") || name.includes("Redevelopment")) return "Planning, parcel, and land development records";
        return `${goal} program data`;
      };

      const geographyForIndicator = name => {
        if (name.includes("Corridor") || name.includes("Transit")) return "Citywide, corridor, and neighborhood area";
        if (name.includes("Neighborhood") || name.includes("Priority") || name.includes("Underserved")) return "Citywide, council district, and priority area";
        if (name.includes("Parks") || name.includes("Retail") || name.includes("Healthy Food") || name.includes("Schools")) return "Citywide and neighborhood area";
        return "Citywide, council district, and planning district";
      };

      const buildMethodology = ({ goal, name, value, direction, status, why, year }) => ({
        what: `${name} reports the current tracked condition for ${goal.toLowerCase()} using the latest available local data.`,
        why,
        dataSource: sourceForIndicator(goal, name),
        updateFrequency: "Annual, as source data is refreshed",
        geography: geographyForIndicator(name),
        baselineYear: "2025",
        desiredChange: direction,
        limitations: "This prototype uses sample data. A live dashboard would document source vintages, quality checks, margin of error, and any methods used to normalize values across geographies.",
        currentValue: value,
        status,
        lastUpdated: year
      });

      const indicators = [
        ["Land Use & Built Form", "Infill Development", "55.7%", "Increase", "Improving", "Shows whether growth is using existing infrastructure and strengthening established areas.", "2027", 56],
        ["Land Use & Built Form", "Greenfield Land Consumed", "1,240 acres", "Decrease", "Needs Attention", "Tracks pressure on undeveloped land and long-term infrastructure obligations.", "2027", 38],
        ["Land Use & Built Form", "Growth in Centers and Corridors", "48.2%", "Increase", "Improving", "Measures whether new activity is concentrating in planned mixed-use places.", "2027", 48],
        ["Land Use & Built Form", "Redevelopment of Vacant or Underutilized Land", "22.5%", "Increase", "Stable", "Indicates whether vacant and underused sites are becoming productive community assets.", "2027", 23],
        ["Land Use & Built Form", "Infrastructure Projects in Priority Areas", "37", "Increase", "Improving", "Tracks delivery of capital projects in priority geographies.", "2027", 78],
        ["Fiscal Sustainability", "Infrastructure Cost per New Household or Job", "$18,400", "Decrease", "Stable", "Connects development patterns to public service and capital costs.", "2027", 62],
        ["Fiscal Sustainability", "Value per Acre", "$415,000", "Increase", "Improving", "Compares land productivity across development patterns and districts.", "2027", 72],
        ["Fiscal Sustainability", "Property Tax Revenue from New Development", "$38.2M", "Increase", "Improving", "Shows how new development supports local public services.", "2027", 68],
        ["Housing", "Average Housing Density", "7.8 units per acre", "Increase", "Stable", "Tracks whether neighborhoods can support more housing choice and local services.", "2027", 50],
        ["Housing", "Detached Housing Share", "61%", "Monitor", "Stable", "Shows the balance of detached homes compared with other housing options.", "2027", 61],
        ["Housing", "Middle Housing Share", "18%", "Increase", "Improving", "Tracks duplexes, townhomes, courtyard housing, and other moderate-scale options.", "2027", 42],
        ["Housing", "Multi-Unit Housing Share", "21%", "Increase", "Stable", "Measures apartments and other multi-unit homes near jobs, transit, and services.", "2027", 45],
        ["Housing", "Housing Cost Burden", "31%", "Decrease", "Needs Attention", "Shows the share of households spending more than they can comfortably afford on housing.", "2027", 31],
        ["Mobility", "Households within a 15-Minute Walk of Transit", "53.9%", "Increase", "Stable", "Shows whether residents can reach transit without needing a car.", "2027", 54],
        ["Mobility", "Households within a 15-Minute Walk of Parks or Trails", "68.4%", "Increase", "Improving", "Measures practical access to recreation, trails, and daily outdoor activity.", "2027", 68],
        ["Mobility", "Households within a 15-Minute Walk of Retail", "46.5%", "Increase", "Stable", "Tracks access to daily needs in complete neighborhoods.", "2027", 47],
        ["Mobility", "Non-Auto Trip Share", "12.7%", "Increase", "Needs Attention", "Shows whether walking, biking, transit, and other options are becoming more useful.", "2027", 29],
        ["Mobility", "Vehicle Miles Traveled per Service Population", "21.3 miles", "Decrease", "Needs Attention", "Measures travel demand and transportation efficiency across residents and jobs.", "2027", 34],
        ["Public Health", "Households within a 15-Minute Walk of Healthy Food Retail", "46.8%", "Increase", "Stable", "Tracks practical access to daily food options that support household health.", "2027", 47],
        ["Public Health", "Air Quality Alert Days", "18 days", "Decrease", "Needs Attention", "Monitors environmental conditions that affect respiratory health and outdoor activity.", "2027", 32],
        ["Public Health", "Safe Routes to Schools Coverage", "41.5%", "Increase", "Improving", "Shows whether children and families have safer walking and biking routes near schools.", "2027", 58],
        ["Economic Development", "Jobs Accessible within 20 Minutes", "42.6%", "Increase", "Stable", "Shows how many jobs are reasonably reachable from where people live.", "2027", 43],
        ["Economic Development", "Average Wage", "$56,800", "Increase", "Improving", "Tracks whether economic growth is translating into stronger wages.", "2027", 64],
        ["Economic Development", "Jobs Near Transit", "37.4%", "Increase", "Stable", "Connects employment growth to transportation choice.", "2027", 37],
        ["Economic Development", "Youth Job Pathway Opportunities", "1,250 placements", "Increase", "Improving", "Counts internships, apprenticeships, and workforce programs connected to local youth.", "2027", 74],
        ["Sustainability & Resiliency", "Tree Canopy Coverage", "28.5%", "Increase", "Stable", "Tracks shade, heat mitigation, air quality, and neighborhood comfort.", "2027", 57],
        ["Sustainability & Resiliency", "Impervious Surface Coverage", "34.2%", "Decrease", "Stable", "Shows how much land is covered by hard surfaces that increase runoff and heat.", "2027", 46],
        ["Sustainability & Resiliency", "Development in Flood-Prone Areas", "6.1%", "Decrease", "Needs Attention", "Monitors exposure to flooding and long-term climate risk.", "2027", 22],
        ["Sustainability & Resiliency", "Greenfield and Agricultural Land Consumed", "1,240 acres", "Decrease", "Needs Attention", "Tracks loss of open land and farmland at the edge of the city.", "2027", 35],
        ["Economic Development", "Public Investment in Historically Underserved Areas", "$84.5M", "Increase", "Improving", "Shows where public dollars are being directed and who benefits.", "2027", 70],
        ["Economic Development", "Neighborhoods with Improved Access to Transit", "14", "Increase", "Improving", "Counts places where transit access has measurably improved.", "2027", 66],
        ["Economic Development", "Areas with High Displacement Risk", "9", "Decrease", "Needs Attention", "Identifies neighborhoods where rising costs could displace residents or businesses.", "2027", 27]
      ].map(([goal, name, value, direction, status, why, year, progress]) => {
        const indicator = { goal, name, value, direction, status, why, year, progress };
        return { ...indicator, methodology: buildMethodology(indicator) };
      });

      const investments = [
        "24th Street Corridor Reinvestment",
        "Sidewalk Gap Program",
        "Transit Access Improvements",
        "Neighborhood Park Upgrades",
        "Affordable Housing Preservation Program",
        "Downtown Mixed-Use Redevelopment",
        "Trail Connection Expansion"
      ];

      const statusStyles = {
        "Improving": "bg-[#e8f7f3] text-[#006057] ring-[#39C1A1]/35",
        "Stable": "bg-[#eef1f3] text-[#58595B] ring-[#7C9BA9]/45",
        "Needs Attention": "bg-[#f6e8e7] text-[#620603] ring-[#620603]/25",
        "Completed": "bg-[#e8f7f3] text-[#006057] ring-[#39C1A1]/35",
        "In Progress": "bg-[#eaf0ff] text-[#0441BE] ring-[#0441BE]/25",
        "Delayed": "bg-[#f6e8e7] text-[#620603] ring-[#620603]/25",
        "Ongoing": "bg-[#fff3da] text-[#620603] ring-[#F1BD51]/55",
        "Not Started": "bg-[#efede7] text-[#58595B] ring-[#D1CBBB]",
        "Funded": "bg-[#e8f7f3] text-[#006057] ring-[#39C1A1]/35",
        "Partially Funded": "bg-[#fff3da] text-[#620603] ring-[#F1BD51]/55",
        "Unfunded": "bg-[#efede7] text-[#58595B] ring-[#D1CBBB]"
      };

      function Badge({ children }) {
        return <span className={`inline-flex items-center rounded-full px-2.5 py-1 text-xs font-bold ring-1 ${statusStyles[children] || "bg-[#efede7] text-[#58595B] ring-[#D1CBBB]"}`}>{children}</span>;
      }

      function SectionHeading({ eyebrow, title, children }) {
        return (
          <div className="mx-auto mb-7 max-w-3xl text-center">
            <p className="text-xs font-extrabold uppercase tracking-[0.18em] text-civic-ink">{eyebrow}</p>
            <h2 className="mt-2 text-3xl font-extrabold text-[#111111] sm:text-4xl">{title}</h2>
            {children && <p className="mt-3 text-base leading-7 text-civic-muted">{children}</p>}
          </div>
        );
      }

      function Select({ label, value, setValue, options }) {
        return (
          <label className="block">
            <span className="mb-1 block text-xs font-semibold uppercase tracking-wide text-civic-muted">{label}</span>
            <select value={value} onChange={e => setValue(e.target.value)} className="focus-ring w-full rounded-xl border border-civic-line bg-white/95 px-3 py-2.5 text-sm font-semibold text-civic-ink shadow-sm">
              <option>All</option>
              {options.map(option => <option key={option}>{option}</option>)}
            </select>
          </label>
        );
      }

      function IndicatorDetailsDrawer({ indicator, onClose }) {
        if (!indicator) return null;
        const details = [
          ["What it measures", indicator.methodology.what],
          ["Why it matters", indicator.methodology.why],
          ["Data source", indicator.methodology.dataSource],
          ["Update frequency", indicator.methodology.updateFrequency],
          ["Geography", indicator.methodology.geography],
          ["Baseline year", indicator.methodology.baselineYear],
          ["Direction of desired change", indicator.methodology.desiredChange],
          ["Limitations", indicator.methodology.limitations]
        ];
        return (
          <div className="fixed inset-0 z-50 flex justify-end bg-black/35 px-0 sm:px-4" role="dialog" aria-modal="true" aria-labelledby="indicator-drawer-title" onClick={onClose}>
            <aside className="h-full w-full overflow-y-auto border-l border-civic-line bg-white p-5 shadow-2xl sm:max-w-xl sm:p-7" onClick={event => event.stopPropagation()}>
              <div className="mb-5 flex items-start justify-between gap-4 border-b border-civic-line pb-5">
                <div>
                  <p className="text-xs font-extrabold uppercase tracking-[0.18em] text-[#620603]">About this measure</p>
                  <h2 id="indicator-drawer-title" className="mt-2 text-2xl font-black leading-tight text-[#111111]">{indicator.name}</h2>
                  <div className="mt-3 flex flex-wrap items-center gap-2">
                    <span className="rounded-full px-3 py-1 text-xs font-extrabold text-white" style={{ backgroundColor: goalStyle(indicator.goal).color }}>{indicator.goal}</span>
                    <Badge>{indicator.status}</Badge>
                  </div>
                </div>
                <button type="button" onClick={onClose} className="focus-ring rounded-lg border border-civic-line bg-white px-3 py-2 text-sm font-extrabold text-[#111111] hover:bg-[#f3f0e7]" aria-label="Close indicator details">Close</button>
              </div>
              <div className="grid gap-3 rounded-2xl border border-civic-line bg-[#fbfaf7] p-4 sm:grid-cols-2">
                <div>
                  <p className="text-xs font-bold uppercase tracking-wide text-civic-muted">Current value</p>
                  <p className="mt-1 text-2xl font-black text-[#111111]">{indicator.value}</p>
                </div>
                <div>
                  <p className="text-xs font-bold uppercase tracking-wide text-civic-muted">Last updated</p>
                  <p className="mt-1 text-2xl font-black text-[#111111]">{indicator.year}</p>
                </div>
              </div>
              <div className="mt-5 space-y-4">
                {details.map(([label, text]) => (
                  <section key={label} className="border-b border-civic-line pb-4 last:border-b-0">
                    <h3 className="text-sm font-extrabold text-[#111111]">{label}</h3>
                    <p className="mt-1 text-sm leading-6 text-civic-muted">{text}</p>
                  </section>
                ))}
              </div>
            </aside>
          </div>
        );
      }

      const sectionIds = navItems.map(([, id]) => id);
      const cleanRouteParams = params => Object.fromEntries(
        Object.entries(params || {}).filter(([, value]) => value && value !== "All")
      );

      function parseRouteHash() {
        const rawHash = window.location.hash.replace(/^#/, "");
        const [rawSection, rawQuery = ""] = rawHash.split("?");
        const section = sectionIds.includes(rawSection) ? rawSection : "overview";
        const params = Object.fromEntries(new URLSearchParams(rawQuery));
        return { section, params: cleanRouteParams(params) };
      }

      function buildRouteHash(section, params = {}) {
        const safeSection = sectionIds.includes(section) ? section : "overview";
        const search = new URLSearchParams(cleanRouteParams(params)).toString();
        return `#${safeSection}${search ? `?${search}` : ""}`;
      }

      function Header({ activeSection, setActiveSection }) {
        return (
          <header className="sticky top-0 z-40 border-b border-civic-line bg-white">
            <div className="mx-auto flex max-w-7xl flex-wrap items-center justify-between gap-3 px-4 py-4 sm:px-6 lg:px-8">
              <a
                href="https://wemake.omaha.gov/"
                className="focus-ring flex items-center rounded-lg"
                aria-label="Go to We Make Omaha website"
              >
                <img
                  src="./assets/we-make-omaha-logo.jpg"
                  alt="We Make Omaha"
                  className="h-14 w-44 rounded-sm object-contain object-left sm:h-16 sm:w-56"
                />
              </a>
              <nav className="hidden min-w-0 flex-1 flex-wrap items-center justify-end gap-1 lg:flex" aria-label="Tracker sections">
                {navItems.map(([label, id]) => (
                  <button key={id} type="button" onClick={() => setActiveSection(id)} className={`whitespace-nowrap rounded-lg px-2 py-1.5 text-[0.72rem] font-extrabold leading-tight transition xl:px-2.5 xl:text-xs 2xl:px-3 2xl:text-sm ${activeSection === id ? "bg-[#620603] text-white" : "text-civic-muted hover:bg-[#f3f0e7] hover:text-[#111111]"}`}>
                    {label}
                  </button>
                ))}
              </nav>
              <label className="flex w-full max-w-xs lg:hidden">
                <select value={activeSection} onChange={event => setActiveSection(event.target.value)} className="focus-ring w-full rounded-xl border border-civic-line bg-white px-3 py-2.5 text-sm font-extrabold text-civic-ink shadow-sm">
                  {navItems.map(([label, id]) => (
                    <option key={id} value={id}>{label}</option>
                  ))}
                </select>
              </label>
            </div>
          </header>
        );
      }

      function Overview({ navigate }) {
        const stats = [
          ["42", "indicators tracked"],
          ["18", "actions completed this year"],
          ["11", "actions in progress"],
          ["6", "indicators improving"],
          ["3", "indicators needing attention"],
          ["8", "plan goal areas"]
        ];
        return (
          <section id="overview" className="px-4 pb-16 pt-10 sm:px-6 lg:px-8">
            <div className="mx-auto max-w-7xl">
              <div className="grid gap-8 lg:grid-cols-[1.05fr_0.95fr] lg:items-center">
                <div className="relative">

      function App() {
        const [route, setRoute] = useState(() => parseRouteHash());
        const [globalSearch, setGlobalSearch] = useState(route.params.q || "");
        const [selectedIndicator, setSelectedIndicator] = useState(null);
        useEffect(() => {
          const handleHashChange = () => setRoute(parseRouteHash());
          window.addEventListener("hashchange", handleHashChange);
          handleHashChange();
          return () => window.removeEventListener("hashchange", handleHashChange);
        }, []);
        useEffect(() => {
          const handleEscape = event => {
            if (event.key === "Escape") setSelectedIndicator(null);
          };
          window.addEventListener("keydown", handleEscape);
          return () => window.removeEventListener("keydown", handleEscape);
        }, []);
        const commitRoute = (section, params = {}) => {
          const hash = buildRouteHash(section, params);
          if (window.location.hash !== hash) {
            window.location.hash = hash;
          } else {
            setRoute({ section, params: cleanRouteParams(params) });
          }
        };
        const navigate = (section, params = {}) => commitRoute(section, params);
        const updateRouteParam = (key, value) => {
          commitRoute(route.section, { ...route.params, [key]: value });
        };
        const activeSection = route.section;
        const sectionComponents = {
          overview: <Overview navigate={navigate} />,
          implementation: <ImplementationTracker search={globalSearch} setSearch={setGlobalSearch} routeParams={route.params} onParamChange={updateRouteParam} />,
          indicators: <IndicatorsDashboard search={globalSearch} setSearch={setGlobalSearch} routeParams={route.params} onParamChange={updateRouteParam} onOpenIndicator={setSelectedIndicator} />,
          investments: <InvestmentMap routeParams={route.params} onParamChange={updateRouteParam} />,
          reports: <AnnualReports />,
          methods: <DataMethods search={globalSearch} setSearch={setGlobalSearch} routeParams={route.params} onParamChange={updateRouteParam} onOpenIndicator={setSelectedIndicator} />
        };
        return (
          <div className="flex min-h-screen flex-col">
            <Header activeSection={activeSection} setActiveSection={navigate} />
            <main className="flex-1">
              {sectionComponents[activeSection]}
            </main>
            <IndicatorDetailsDrawer indicator={selectedIndicator} onClose={() => setSelectedIndicator(null)} />
            <footer className="border-t border-civic-line bg-[#620603] px-6 py-[18px] text-center text-[0.85rem] font-semibold leading-5 text-white">
              Omaha Progress Tracker is a sample public-facing implementation dashboard concept for tracking comprehensive plan progress.
            </footer>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
