      const sourceForIndicator = (goal, name) => {
        if (name.includes("Transit") || name.includes("Trip") || name.includes("Vehicle") || name.includes("Routes")) return "City transportation and transit datasets";
        if (name.includes("Housing") || name.includes("Density") || name.includes("Unit") || name.includes("Cost Burden")) return "Housing, parcel, and census datasets";
        if (name.includes("Investment") || name.includes("Projects") || name.includes("Infrastructure")) return "Capital improvement and budget records";
        if (name.includes("Tree") || name.includes("Impervious") || name.includes("Flood") || name.includes("Air Quality")) return "Environmental and resilience datasets";
        if (name.includes("Jobs") || name.includes("Wage") || name.includes("Business") || name.includes("Pathway")) return "Economic development and workforce datasets";
        if (name.includes("Development") || name.includes("Land") || name.includes("Greenfield") || name.includes("Redevelopment")) return "Planning, parcel, and land development records";
        return `${goal} program data`;
      };

      const geographyForIndicator = name => {
        if (name.includes("Corridor") || name.includes("Transit")) return "Citywide, corridor, and neighborhood area";
        if (name.includes("Neighborhood") || name.includes("Priority") || name.includes("Underserved")) return "Citywide, council district, and priority area";
        if (name.includes("Parks") || name.includes("Retail") || name.includes("Healthy Food") || name.includes("Schools")) return "Citywide and neighborhood area";
        return "Citywide, council district, and planning district";
      };

      const buildMethodology = ({ goal, name, value, status, why, year }) => ({
        what: `${name} reports the current tracked condition for ${goal.toLowerCase()} using the latest available local data.`,

        dataSource: sourceForIndicator(goal, name),
        updateFrequency: "Annual, as source data is refreshed",

        baselineYear: "2025",
        limitations: "This prototype uses sample data. A live dashboard would document source vintages, quality checks, margin of error, and any methods used to normalize values across geographies.",
        currentValue: value,
        status,
        lastUpdated: year
      });

      const indicators = [
        ["Land Use & Built Form", "Infill Development", "55.7%", "Increase", "Improving", "Shows whether growth is using existing infrastructure and strengthening established areas.", "2027", 56],

        overview: "home",

      };
      const normalizeSection = section => {
        const normalized = routeAliases[section] || section;
        return sectionIds.includes(normalized) ? normalized : "home";
      };
      const cleanRouteParams = params => Object.fromEntries(
        Object.entries(params || {}).filter(([key, value]) => key !== "section" && value && value !== "All")
      );

      function parseRouteLocation() {
        const searchParams = new URLSearchParams(window.location.search);
        let section = normalizeSection(searchParams.get("section") || "home");
        const params = Object.fromEntries(searchParams);
        if (window.location.hash) {
          const rawHash = window.location.hash.replace(/^#/, "");
          const [rawSection, rawQuery = ""] = rawHash.split("?");
          section = normalizeSection(rawSection || section);
          Object.assign(params, Object.fromEntries(new URLSearchParams(rawQuery)));
        }
        return { section, params: cleanRouteParams(params) };
      }

      function buildRouteUrl(section, params = {}) {
        const url = new URL(window.location.href);
        const safeSection = normalizeSection(section);
        const search = new URLSearchParams();
        search.set("section", safeSection);
        Object.entries(cleanRouteParams(params)).forEach(([key, value]) => search.set(key, value));
        url.search = search.toString();
        url.hash = "";
        return url;
      }

                const active = selectedProject?.name === project.name;
                return (
                  <button key={project.name} type="button" onClick={() => setSelectedProject(project)} className={`focus-ring absolute grid h-9 w-9 -translate-x-1/2 -translate-y-1/2 place-items-center rounded-full border-2 border-white text-sm font-black text-white shadow-lg transition ${active ? "scale-110 bg-[#FA4F1E] ring-4 ring-[#620603]/18" : "bg-[#111111] hover:bg-[#620603]"}`} style={{ left: `${left}%`, top: `${top}%` }} aria-label={`Show details for ${project.name}`}>
                    {index + 1}
                  </button>
                );
              })}
              <div className="absolute bottom-4 right-4 hidden rounded-2xl border border-civic-line bg-white/94 p-3 text-xs font-bold text-civic-muted shadow-sm sm:block">
                <div className="flex items-center gap-2"><span className="h-2 w-8 rounded-full bg-[#FA4F1E]/45"></span>Priority corridor</div>
                <div className="mt-2 flex items-center gap-2"><span className="h-2 w-8 rounded-full bg-[#0441BE]/25"></span>Transit access route</div>
                <div className="mt-2 flex items-center gap-2"><span className="h-2 w-8 rounded-full bg-[#39C1A1]/55"></span>River / greenway</div>
              </div>
            </div>
          );
        }

        function ProjectCard({ project, index }) {
          const active = selectedProject?.name === project.name;
          return (
            <article className={`rounded-xl border p-3 transition ${active ? "border-[#FA4F1E] bg-white shadow-sm" : "border-civic-line bg-[#f8f7f3] hover:border-[#FA4F1E]/35"}`}>
              <button type="button" onClick={() => setSelectedProject(project)} className="focus-ring w-full rounded-lg text-left">
                <p className="text-sm font-bold text-[#111111]"><span className={`mr-2 inline-grid h-6 w-6 place-items-center rounded-full text-xs text-white ${active ? "bg-[#FA4F1E]" : "bg-civic-ink"}`}>{index + 1}</span>{project.name}</p>
                <div className="mt-3 flex flex-wrap gap-2 text-[0.7rem] font-extrabold uppercase tracking-wide text-civic-muted">
                  <span className="nowrap-pill rounded-full bg-white px-2 py-1">{project.projectType}</span>
                  <span className="nowrap-pill rounded-full bg-white px-2 py-1">{project.status}</span>
                  <span className="nowrap-pill rounded-full bg-white px-2 py-1">{project.relatedGoal}</span>
                </div>
                <p className="mt-3 text-xs font-semibold leading-5 text-civic-muted">{project.description}</p>
              </button>
            </article>
          );
        }

        function ProjectDetails({ project }) {
          return (
            <aside className="rounded-3xl border border-civic-line bg-white p-5 shadow-sm">
              <p className="text-xs font-extrabold uppercase tracking-[0.18em] text-[#620603]">Selected project</p>
              <h3 className="mt-2 text-2xl font-black text-[#111111]">{project.name}</h3>
              <div className="mt-4 grid gap-3 text-sm sm:grid-cols-2">
                {[
                  ["Project type", project.projectType],
                  ["Status", project.status],
                  ["Phase", project.phase],
                  ["Department", project.department],
                  ["Related goal", project.relatedGoal],
                  ["Related policy", project.relatedPolicy],
                  ["Investment", project.investment]
                ].map(([label, value]) => (
                  <div key={label} className="rounded-xl bg-[#f3f0e7] p-3">
                    <p className="text-xs font-extrabold uppercase tracking-wide text-civic-muted">{label}</p>
                    <p className="mt-1 font-bold text-[#111111]">{value}</p>
                  </div>
                ))}
              </div>
              <p className="mt-4 text-sm leading-6 text-civic-muted">{project.description}</p>
              <p className="mt-3 text-sm leading-6 text-civic-muted"><strong>Related indicators:</strong> {project.relatedIndicators.join(", ")}</p>
            </aside>
          );
        }

        return (
          <section id="investments" className="px-4 py-16 sm:px-6 lg:px-8">
            <div className="mx-auto max-w-7xl">
              <SectionHeading eyebrow="Implementation Map" title="Where public resources are going">
                Public investments connect adopted plan priorities to capital projects, housing programs, corridor work, and neighborhood improvements.
              </SectionHeading>
              <div className="grid gap-6 lg:grid-cols-[1.25fr_0.75fr]">
                <div className="overflow-hidden rounded-3xl border border-civic-line bg-white shadow-civic">
                  <ConceptMap />
                  <div className="border-t border-civic-line p-4">
                    <div className="mb-4 flex flex-col gap-2 sm:flex-row sm:items-end sm:justify-between">
                      <div>
                        <h3 className="text-lg font-black text-[#111111]">Implementation projects</h3>
                        <p className="mt-1 text-sm leading-6 text-civic-muted">Click a project or map marker to view details, related policy and connected indicators.</p>
                      </div>
                      <p className="text-xs font-bold uppercase tracking-wide text-civic-muted">Illustrative project locations</p>
                    </div>
                    <div className="grid gap-3 md:grid-cols-2">
                      {investments.map((project, index) => <ProjectCard key={project.name} project={project} index={index} />)}
                    </div>
                  </div>
                </div>
                <ProjectDetails project={selectedProject} />
              </div>
            </div>
          </section>
        );
      }

      function AnnualReports() {
        const reportDocuments = [
          ["2027 Annual Progress Report", "Summarizes completed actions, indicator trends, investment highlights and areas needing attention.", "Download report"],
          ["Completed Actions", "Lists plan actions completed during the reporting year with lead departments and related goals.", "View summary"],
          ["Public Investment Summary", "Shows where capital projects, housing programs and corridor investments are being directed.", "View summary"],
          ["Community Priorities", "Connects public engagement themes to related plan goals, actions and indicators.", "View document"]
        ];
        return (
          <section id="reports" className="px-4 py-16 sm:px-6 lg:px-8">
            <div className="mx-auto max-w-7xl">
              <SectionHeading eyebrow="Annual Reports" title="Progress over time">
                Annual reports summarize completed actions, investments, indicator trends, and areas needing continued attention.
              </SectionHeading>
              <div className="brand-panel rounded-3xl border border-civic-line bg-[#620603] p-6 text-white shadow-civic md:p-8">
                <p className="max-w-5xl text-lg leading-8">
                  In 2027, Omaha completed 18 plan actions, advanced 11 additional actions, and began tracking 42 plan indicators. Progress was strongest in corridor planning, park access, and housing production. Areas requiring continued attention include transit access, housing affordability, infrastructure gaps, and investment in historically underserved neighborhoods.
                </p>
              </div>
              <div className="mt-6 grid gap-4 md:grid-cols-2 xl:grid-cols-4">
                {reportDocuments.map(([title, description, action]) => (
                  <article key={title} className="rounded-2xl border border-civic-line bg-white p-5 shadow-sm">
                    <p className="text-xs font-extrabold uppercase tracking-[0.18em] text-[#620603]">Sample document</p>
                    <h3 className="mt-2 text-lg font-black text-[#111111]">{title}</h3>
                    <p className="mt-2 text-sm leading-6 text-civic-muted">{description}</p>
                    <button type="button" className="focus-ring nowrap-pill mt-4 w-full justify-center rounded-full border border-[#620603]/25 bg-white px-3 py-2 text-xs font-extrabold text-[#620603] hover:bg-[#f6e8e7] sm:text-sm">
                      {action} &middot; Coming soon
                    </button>
                  </article>
                ))}
              </div>
            </div>
          </section>
        );
      }

      function ContactUs() {
        const formUrl = "https://docs.google.com/forms/d/e/1FAIpQLSe6v7TFAhlqbyRfh14QB1o5MamjuWn63cGXsc3nqEBEMfX3tg/viewform?usp=header";
        const embedUrl = "https://docs.google.com/forms/d/e/1FAIpQLSe6v7TFAhlqbyRfh14QB1o5MamjuWn63cGXsc3nqEBEMfX3tg/viewform?embedded=true";
        return (
          <section id="contact" className="px-4 py-16 sm:px-6 lg:px-8">
            <div className="mx-auto max-w-4xl">
              <SectionHeading eyebrow="Contact Us" title="Ask a question">
                Have questions about the Omaha Progress Tracker or comprehensive plan implementation? Share your question with the planning team.
              </SectionHeading>
              <div className="rounded-3xl border border-civic-line bg-white p-3 shadow-civic sm:p-5">
                <iframe
                  src={embedUrl}
                  width="100%"
                  height="900"
                  frameBorder="0"
                  marginHeight="0"
                  marginWidth="0"
                  title="Omaha Progress Tracker question form"
                  className="min-h-[850px] w-full rounded-2xl"
                >
                  Loading...
                </iframe>
                <p className="mt-3 text-center text-sm leading-6 text-civic-muted">
                  If the form does not load, <a href={formUrl} target="_blank" rel="noopener noreferrer" className="font-extrabold text-[#620603] underline decoration-[#FA4F1E]/40 underline-offset-4 hover:text-[#4c0502]">open it in a new tab</a>.
                </p>
              </div>
            </div>
          </section>
        );
      }

      const defaultAccessPreferences = {
        textSize: "normal",
        highContrast: false,
        reduceMotion: false
      };

      function getStoredAccessPreferences() {
        try {
          const stored = window.localStorage.getItem("omahaTrackerAccessibility");
          return stored ? { ...defaultAccessPreferences, ...JSON.parse(stored) } : defaultAccessPreferences;
        } catch (error) {
          return defaultAccessPreferences;
        }
      }

      function FloatingAccessTools({ preferences, setPreferences }) {
        const [accessOpen, setAccessOpen] = useState(false);
        const [languageOpen, setLanguageOpen] = useState(false);
        const languages = ["English", "Spanish", "French", "Arabic", "Vietnamese", "Somali"];
        const updatePreference = changes => setPreferences(prev => ({ ...prev, ...changes }));
        const resetPreferences = () => setPreferences(defaultAccessPreferences);

        useEffect(() => {
          const handleEscape = event => {
            if (event.key === "Escape") {
              setAccessOpen(false);
              setLanguageOpen(false);
            }
          };
          window.addEventListener("keydown", handleEscape);
          return () => window.removeEventListener("keydown", handleEscape);
        }, []);

        return (
          <div className="fixed bottom-4 left-4 z-50 flex max-w-[calc(100vw-2rem)] flex-col items-start gap-3 sm:bottom-6 sm:left-6">
            {accessOpen && (
              <div className="w-72 rounded-2xl border border-civic-line bg-white p-4 shadow-2xl" role="dialog" aria-label="Accessibility options">
                <div className="flex items-start justify-between gap-3">
                  <div>
                    <p className="text-sm font-black text-[#111111]">Accessibility options</p>
                    <p className="mt-1 text-xs leading-5 text-civic-muted">Adjust display settings for this prototype.</p>
                  </div>
                  <button type="button" onClick={() => setAccessOpen(false)} className="focus-ring rounded-lg border border-civic-line px-2 py-1 text-xs font-extrabold text-[#111111] hover:bg-[#f3f0e7]" aria-label="Close accessibility options">
                    Close
                  </button>
                </div>
                <div className="mt-4 grid gap-2">
                  <button type="button" onClick={() => updatePreference({ textSize: "large" })} className={`focus-ring rounded-xl border px-3 py-2 text-left text-sm font-extrabold ${preferences.textSize === "large" ? "border-[#620603] bg-[#f6e8e7] text-[#620603]" : "border-civic-line bg-white text-[#111111] hover:bg-[#f3f0e7]"}`}>
                    Increase text size
                  </button>
                  <button type="button" onClick={() => updatePreference({ textSize: "small" })} className={`focus-ring rounded-xl border px-3 py-2 text-left text-sm font-extrabold ${preferences.textSize === "small" ? "border-[#620603] bg-[#f6e8e7] text-[#620603]" : "border-civic-line bg-white text-[#111111] hover:bg-[#f3f0e7]"}`}>
                    Decrease text size
                  </button>
                  <button type="button" onClick={() => updatePreference({ highContrast: !preferences.highContrast })} className={`focus-ring rounded-xl border px-3 py-2 text-left text-sm font-extrabold ${preferences.highContrast ? "border-[#111111] bg-[#111111] text-white" : "border-civic-line bg-white text-[#111111] hover:bg-[#f3f0e7]"}`} aria-pressed={preferences.highContrast}>
                    High contrast mode
                  </button>
                  <button type="button" onClick={() => updatePreference({ reduceMotion: !preferences.reduceMotion })} className={`focus-ring rounded-xl border px-3 py-2 text-left text-sm font-extrabold ${preferences.reduceMotion ? "border-[#111111] bg-[#111111] text-white" : "border-civic-line bg-white text-[#111111] hover:bg-[#f3f0e7]"}`} aria-pressed={preferences.reduceMotion}>
                    Reduce motion
                  </button>
                  <button type="button" onClick={resetPreferences} className="focus-ring rounded-xl border border-[#620603]/25 bg-white px-3 py-2 text-left text-sm font-extrabold text-[#620603] hover:bg-[#f6e8e7]">
                    Reset accessibility settings
                  </button>
                </div>
              </div>
            )}

            <button
              type="button"
              onClick={() => { setAccessOpen(open => !open); setLanguageOpen(false); }}
              className="focus-ring grid h-16 w-16 place-items-center rounded-full bg-[#1a73e8] text-white shadow-xl ring-4 ring-white/80 transition hover:bg-[#1558b0]"
              aria-label="Open accessibility options"
              aria-expanded={accessOpen}
            >
              <svg aria-hidden="true" viewBox="0 0 64 64" className="h-10 w-10" fill="none" stroke="currentColor" strokeLinecap="round" strokeLinejoin="round" strokeWidth="6">
                <circle cx="32" cy="13" r="5" fill="currentColor" stroke="none"></circle>
                <path d="M15 25c6 3 12 4 17 4s11-1 17-4"></path>
                <path d="M32 29v14"></path>
                <path d="M32 43 22 56"></path>
                <path d="M32 43 42 56"></path>
              </svg>
            </button>

            <div className="relative">
              <button
                type="button"
                onClick={() => { setLanguageOpen(open => !open); setAccessOpen(false); }}
                className="focus-ring flex items-center gap-3 rounded-sm border border-civic-line bg-white px-5 py-4 text-lg font-black text-[#111111] shadow-lg"
                aria-label="Open language options"
                aria-expanded={languageOpen}
              >
                <span className="grid h-6 w-8 place-items-center rounded border border-civic-line bg-[#f3f0e7] text-[0.65rem] font-black text-[#620603]" aria-hidden="true">EN</span>
                <span>EN</span>
                <span className={`text-civic-muted transition ${languageOpen ? "rotate-180" : ""}`} aria-hidden="true">v</span>
              </button>
              {languageOpen && (
                <div className="absolute bottom-full left-0 mb-2 w-72 rounded-2xl border border-civic-line bg-white p-4 shadow-2xl" role="menu" aria-label="Language options">
                  <p className="text-sm font-black text-[#111111]">Language</p>
                  <p className="mt-1 text-xs leading-5 text-civic-muted">English is available now. Expanded translation support can be connected in a future version.</p>
                  <div className="mt-3 grid gap-2">
                    {languages.map(language => (
                      <button key={language} type="button" className={`focus-ring flex items-center justify-between rounded-xl border px-3 py-2 text-sm font-extrabold ${language === "English" ? "border-[#620603] bg-[#f6e8e7] text-[#620603]" : "border-civic-line bg-white text-[#111111] hover:bg-[#f3f0e7]"}`} role="menuitem" onClick={() => language === "English" && setLanguageOpen(false)}>
                        <span>{language}</span>
                        <span className="text-xs font-bold text-civic-muted">{language === "English" ? "Current" : "Coming soon"}</span>
                      </button>
                    ))}
                  </div>
                </div>
              )}
            </div>
          </div>
        );
      }

      function App() {
        const [route, setRoute] = useState(() => parseRouteLocation());
        const [globalSearch, setGlobalSearch] = useState(route.params.q || "");
        const [selectedIndicator, setSelectedIndicator] = useState(null);
        const [accessPreferences, setAccessPreferences] = useState(() => getStoredAccessPreferences());
        useEffect(() => {
          const syncRoute = () => {
            const nextRoute = parseRouteLocation();
            const normalizedUrl = buildRouteUrl(nextRoute.section, nextRoute.params);
            if (window.location.href !== normalizedUrl.href) {
              window.history.replaceState(null, "", normalizedUrl);
            }
            setRoute(nextRoute);
          };
          window.addEventListener("popstate", syncRoute);
          syncRoute();
          return () => window.removeEventListener("popstate", syncRoute);
        }, []);
        useEffect(() => {
          const handleEscape = event => {
            if (event.key === "Escape") setSelectedIndicator(null);
          };
          window.addEventListener("keydown", handleEscape);
          return () => window.removeEventListener("keydown", handleEscape);
        }, []);
        useEffect(() => {
          const root = document.documentElement;
          root.classList.toggle("access-text-large", accessPreferences.textSize === "large");
          root.classList.toggle("access-text-small", accessPreferences.textSize === "small");
          root.classList.toggle("access-high-contrast", accessPreferences.highContrast);
          root.classList.toggle("access-reduce-motion", accessPreferences.reduceMotion);
          try {
            window.localStorage.setItem("omahaTrackerAccessibility", JSON.stringify(accessPreferences));
          } catch (error) {}
        }, [accessPreferences]);
        const commitRoute = (section, params = {}) => {
          const nextSection = normalizeSection(section);
          const nextParams = cleanRouteParams(params);
          const url = buildRouteUrl(nextSection, nextParams);
          if (window.location.href !== url.href) {
            window.history.pushState(null, "", url);
          } else {
            window.history.replaceState(null, "", url);
          }
          setRoute({ section: nextSection, params: nextParams });
        };
        const navigate = (section, params = {}) => commitRoute(section, params);
        const updateRouteParam = (key, value) => {
          commitRoute(route.section, { ...route.params, [key]: value });
        };
        const activeSection = route.section;
        const sectionComponents = {
          home: <Overview navigate={navigate} />,
          implementation: <ImplementationTracker search={globalSearch} setSearch={setGlobalSearch} routeParams={route.params} onParamChange={updateRouteParam} />,
          indicators: <IndicatorsDashboard search={globalSearch} setSearch={setGlobalSearch} routeParams={route.params} onParamChange={updateRouteParam} onOpenIndicator={setSelectedIndicator} />,
          "implementation-map": <InvestmentMap routeParams={route.params} onParamChange={updateRouteParam} />,
          reports: <AnnualReports />,
          contact: <ContactUs />
        };
        return (
          <div className="flex min-h-screen flex-col">
            <Header activeSection={activeSection} setActiveSection={navigate} />
            <main className="flex-1">
              {sectionComponents[activeSection]}
            </main>
            <IndicatorDetailsDrawer indicator={selectedIndicator} onClose={() => setSelectedIndicator(null)} />
            <FloatingAccessTools preferences={accessPreferences} setPreferences={setAccessPreferences} />
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
