        return (

            <span className="mb-1 block text-xs font-semibold uppercase tracking-wide text-civic-muted">{label}</span>
            <select value={value} onChange={e => setValue(e.target.value)} className="focus-ring w-full rounded-xl border border-civic-line bg-white/95 px-3 py-2.5 text-sm font-semibold text-civic-ink shadow-sm">

            </select>
          </label>
        );
      }

      const sectionIds = navItems.map(([, id]) => id);
      const cleanRouteParams = params => Object.fromEntries(
        Object.entries(params || {}).filter(([, value]) => value && value !== "All")

      function parseRouteHash() {
        const rawHash = window.location.hash.replace(/^#/, "");
        const [rawSection, rawQuery = ""] = rawHash.split("?");
        const section = sectionIds.includes(rawSection) ? rawSection : "overview";
        const params = Object.fromEntries(new URLSearchParams(rawQuery));
        return { section, params: cleanRouteParams(params) };
      }

      function buildRouteHash(section, params = {}) {
        const safeSection = sectionIds.includes(section) ? section : "overview";
        const search = new URLSearchParams(cleanRouteParams(params)).toString();
        return `#${safeSection}${search ? `?${search}` : ""}`;
      }

        useEffect(() => setDepartment(routeParams.department || "All"), [routeParams.department]);
        const updateFilter = (key, value, setter) => {
          setter(value);
          onParamChange(key, value);
        };
        const filtered = useMemo(() => actions.filter(action => {
          const text = `${action.title} ${action.goal} ${action.department} ${action.indicators.join(" ")}`.toLowerCase();
          return (!search || text.includes(search.toLowerCase())) &&
            (status === "All" || action.status === status) &&
            (goal === "All" || action.goal === goal) &&
            (timeframe === "All" || action.timeframe === timeframe) &&
            (department === "All" || action.department === department);
        }), [status, goal, timeframe, department, search]);
        return (
          <section id="implementation" className="border-y border-civic-line bg-[#efe9dc]/68 px-4 py-16 sm:px-6 lg:px-8">
            <div className="mx-auto max-w-7xl">
              <SectionHeading eyebrow="Implementation Tracker" title="Plan actions and accountability">
                Filter plan actions by status, goal area, timeframe, or lead department. Each action connects work programs to measurable outcomes.
              </SectionHeading>
              <div className="rounded-3xl border border-civic-line bg-white p-4 shadow-civic">
                <div className="grid gap-3 md:grid-cols-5">
                  <label className="md:col-span-1">
                    <span className="mb-1 block text-xs font-semibold uppercase tracking-wide text-civic-muted">Search</span>
                    <input value={search} onChange={e => { setSearch(e.target.value); onParamChange("q", e.target.value); }} placeholder="Search actions or indicators" className="focus-ring w-full rounded-xl border border-civic-line bg-white/95 px-3 py-2.5 text-sm shadow-sm" />
                  </label>
                  <Select label="Status" value={status} setValue={value => updateFilter("status", value, setStatus)} options={["Not Started", "In Progress", "Completed", "Delayed", "Ongoing"]} />
                  <Select label="Goal Area" value={goal} setValue={value => updateFilter("goal", value, setGoal)} options={goals.map(g => g.name)} />
                  <Select label="Timeframe" value={timeframe} setValue={value => updateFilter("timeframe", value, setTimeframe)} options={["Short-term", "Medium-term", "Long-term"]} />
                  <Select label="Department" value={department} setValue={value => updateFilter("department", value, setDepartment)} options={[...new Set(actions.map(a => a.department))]} />
                </div>
                <div className="mt-5 overflow-hidden rounded-2xl border border-civic-line">
                  <div className="hidden grid-cols-[1.5fr_0.75fr_0.85fr_0.65fr_1fr_1.1fr_0.7fr] gap-4 bg-[#f3f0e7] px-4 py-3 text-xs font-extrabold uppercase tracking-wide text-civic-muted lg:grid">
                    <span>Action</span><span>Status</span><span>Lead</span><span>Timeframe</span><span>Goal</span><span>Related indicators</span><span>Funding</span>
                  </div>
                  {filtered.map(action => (
                    <article key={action.title} className="grid gap-4 border-t border-civic-line bg-white px-4 py-4 first:border-t-0 lg:grid-cols-[1.5fr_0.75fr_0.85fr_0.65fr_1fr_1.1fr_0.7fr] lg:items-center">
                      <h3 className="text-sm font-bold leading-6">{action.title}</h3>
                      <Badge>{action.status}</Badge>
                      <p className="text-sm text-civic-muted">{action.department}</p>
                      <p className="text-sm font-semibold">{action.timeframe}</p>
                      <p className="text-sm text-civic-muted">{action.goal}</p>
                      <p className="text-sm leading-6 text-civic-muted">{action.indicators.join(", ")}</p>
                      <Badge>{action.funding}</Badge>
                    </article>
                  ))}
                </div>
              </div>
            </div>
          </section>
        );
      }

      function IndicatorsDashboard({ search, setSearch, routeParams, onParamChange }) {
        const [goal, setGoal] = useState(routeParams.goal || "All");
        const [status, setStatus] = useState(routeParams.status || "All");
        const [year, setYear] = useState(routeParams.year || "All");
        const [geo, setGeo] = useState(routeParams.geo || "All");
        const [tab, setTab] = useState(routeParams.goal || "All");
        useEffect(() => setSearch(routeParams.q || ""), [routeParams.q]);
        useEffect(() => {
          const nextGoal = routeParams.goal || "All";
          setGoal(nextGoal);
          setTab(nextGoal);
        }, [routeParams.goal]);
        useEffect(() => setStatus(routeParams.status || "All"), [routeParams.status]);
        useEffect(() => setYear(routeParams.year || "All"), [routeParams.year]);
        useEffect(() => setGeo(routeParams.geo || "All"), [routeParams.geo]);
        const updateFilter = (key, value, setter) => {
          setter(value);
          onParamChange(key, value);
        };
        const selectedGoal = tab !== "All" ? tab : goal;
        const filtered = useMemo(() => indicators.filter(indicator => {
          const text = `${indicator.name} ${indicator.goal} ${indicator.why}`.toLowerCase();
          return (!search || text.includes(search.toLowerCase())) &&
            (selectedGoal === "All" || indicator.goal === selectedGoal) &&
            (status === "All" || indicator.status === status) &&
            (year === "All" || indicator.year === year);
        }), [search, selectedGoal, status, year]);
        return (
          <section id="indicators" className="px-4 py-16 sm:px-6 lg:px-8">
            <div className="mx-auto max-w-7xl">
              <SectionHeading eyebrow="Indicators Dashboard" title="Measures of plan impact">
                Indicators show whether citywide and neighborhood conditions are improving, stable, or need continued attention.
              </SectionHeading>
              <div className="mb-5 flex gap-2 overflow-x-auto pb-2">
                {["All", ...goals.map(g => g.name)].map(name => (
                  <button key={name} onClick={() => { setTab(name); setGoal(name); onParamChange("goal", name); }} className={`whitespace-nowrap rounded-full px-4 py-2 text-sm font-extrabold ring-1 ${tab === name ? "bg-[#620603] text-white ring-[#620603]" : "bg-white/90 text-civic-muted ring-civic-line hover:text-[#111111]"}`} style={tab === name && name !== "All" ? { boxShadow: `inset 0 -4px 0 ${goalStyle(name).color}` } : {}}>{name}</button>
                ))}
              </div>
              <div className="mb-6 grid gap-3 rounded-3xl border border-civic-line bg-white p-4 shadow-sm md:grid-cols-5">
                <label>
                  <span className="mb-1 block text-xs font-semibold uppercase tracking-wide text-civic-muted">Search</span>
                  <input value={search} onChange={e => { setSearch(e.target.value); onParamChange("q", e.target.value); }} placeholder="Search indicators" className="focus-ring w-full rounded-xl border border-civic-line bg-white/95 px-3 py-2.5 text-sm shadow-sm" />
                </label>
                <Select label="Goal Area" value={goal} setValue={value => { setGoal(value); setTab(value); onParamChange("goal", value); }} options={goals.map(g => g.name)} />
                <Select label="Geography" value={geo} setValue={value => updateFilter("geo", value, setGeo)} options={["Citywide", "Council District", "Neighborhood Area", "Priority Corridor"]} />
                <Select label="Year" value={year} setValue={value => updateFilter("year", value, setYear)} options={["2027", "2026", "2025"]} />
                <Select label="Indicator Status" value={status} setValue={value => updateFilter("status", value, setStatus)} options={["Improving", "Stable", "Needs Attention"]} />
              </div>
              <div className="grid gap-4 md:grid-cols-2 xl:grid-cols-3">
                {filtered.map(indicator => (
                  <article key={indicator.name} className="rounded-2xl border border-civic-line bg-white p-5 shadow-sm" style={{ borderTop: `5px solid ${goalStyle(indicator.goal).color}` }}>
                    <div className="flex items-start justify-between gap-3">
                      <div>
                        <p className="text-xs font-extrabold uppercase tracking-wide" style={{ color: goalStyle(indicator.goal).color }}>{indicator.goal}</p>
                        <h3 className="mt-1 text-lg font-extrabold leading-6 text-[#111111]">{indicator.name}</h3>
                      </div>
                      <Badge>{indicator.status}</Badge>
                    </div>
                    <div className="mt-4 flex items-end justify-between">
                      <p className="text-3xl font-black text-[#111111]">{indicator.value}</p>
                      <p className="rounded-lg bg-[#f3f0e7] px-2.5 py-1 text-xs font-extrabold text-civic-muted">{indicator.direction}</p>
                    </div>
                    <div className="mt-4 h-2.5 overflow-hidden rounded-full bg-[#efede7]">
                      <div className="h-full rounded-full" style={{ width: `${indicator.progress}%`, backgroundColor: indicator.status === "Needs Attention" ? "#620603" : indicator.status === "Stable" ? "#7C9BA9" : goalStyle(indicator.goal).color }}></div>
                    </div>
                    <p className="mt-4 text-sm leading-6 text-civic-muted">{indicator.why}</p>
                    <div className="mt-4 flex flex-wrap items-center gap-2 text-xs font-semibold text-civic-muted">
                      <span className="rounded-full bg-[#f3f0e7] px-2.5 py-1">Updated {indicator.year}</span>
                      <span className="rounded-full bg-[#f3f0e7] px-2.5 py-1">Related plan goal</span>
                    </div>
                  </article>
                ))}
              </div>
            </div>
          </section>
        );
      }

      function ExploreAreas({ routeParams, onParamChange }) {
        const [geoType, setGeoType] = useState(routeParams.type || "Neighborhood Area");
        useEffect(() => setGeoType(routeParams.type || "Neighborhood Area"), [routeParams.type]);
        return (
          <section id="areas" className="border-y border-civic-line bg-[#efe9dc]/68 px-4 py-16 sm:px-6 lg:px-8">
            <div className="mx-auto max-w-7xl">
              <SectionHeading eyebrow="Explore by Area" title="See who and what areas are benefiting">
                How plan actions and public investments are showing up in different parts of Omaha.
              </SectionHeading>
              <div className="mb-6 flex flex-wrap justify-center gap-2">
                {["Citywide", "City Council District", "Neighborhood Area", "Priority Corridor", "Historically Underserved Area"].map(type => (
                  <button key={type} onClick={() => { setGeoType(type); onParamChange("type", type); }} className={`rounded-full px-4 py-2 text-sm font-extrabold ring-1 ${geoType === type ? "bg-[#620603] text-white ring-[#620603]" : "bg-white/90 text-civic-muted ring-civic-line"}`}>{type}</button>
                ))}
              </div>
              <div className="grid gap-4 md:grid-cols-2 xl:grid-cols-3">
                {areaProfiles.map(area => (
                  <article key={area.name} className="rounded-2xl border border-civic-line bg-white p-5 shadow-sm">
                    <div className="flex items-start justify-between gap-3">
                      <h3 className="text-xl font-black text-[#111111]">{area.name}</h3>
                      <span className="rounded-full bg-[#f3f0e7] px-2.5 py-1 text-xs font-bold text-civic-muted">{geoType}</span>
                    </div>
                    <dl className="mt-5 space-y-4 text-sm leading-6">
                      <div><dt className="font-bold text-[#111111]">Key priorities from engagement</dt><dd className="mt-1 text-civic-muted">{area.priorities}</dd></div>
                      <div><dt className="font-bold text-[#111111]">Current projects</dt><dd className="mt-1 text-civic-muted">{area.projects}</dd></div>
                      <div><dt className="font-bold text-[#111111]">Key indicators</dt><dd className="mt-1 text-civic-muted">{area.indicators}</dd></div>
                    </dl>
                    <div className="mt-5 rounded-xl border-l-4 border-civic-orange bg-[#f3f0e7] p-3 text-sm font-extrabold text-civic-ink">Progress status: {area.status}</div>
                  </article>
                ))}
              </div>
            </div>
          </section>
        );
      }

      function InvestmentMap({ routeParams, onParamChange }) {
        const layers = ["Capital Improvement Projects", "Housing Investments", "Transportation Projects", "Parks Projects", "Economic Development Projects", "Planning Initiatives", "Priority Corridors", "Historically Underserved Areas"];
        const routeLayers = routeParams.layers ? routeParams.layers.split("|").filter(layer => layers.includes(layer)) : layers.slice(0, 4);
        const [activeLayers, setActiveLayers] = useState(routeLayers);
        useEffect(() => {
          setActiveLayers(routeParams.layers ? routeParams.layers.split("|").filter(layer => layers.includes(layer)) : layers.slice(0, 4));
        }, [routeParams.layers]);
        const toggle = layer => setActiveLayers(prev => {
          const next = prev.includes(layer) ? prev.filter(item => item !== layer) : [...prev, layer];
          onParamChange("layers", next.join("|"));
          return next;
        });
        return (
          <section id="investments" className="px-4 py-16 sm:px-6 lg:px-8">
            <div className="mx-auto max-w-7xl">
              <SectionHeading eyebrow="Implementation Map" title="Where public resources are going">
                Public investments connect adopted plan priorities to capital projects, housing programs, corridor work, and neighborhood improvements.
              </SectionHeading>
              <div className="grid gap-6 lg:grid-cols-[0.72fr_1.28fr]">
                <div className="rounded-3xl border border-civic-line bg-white p-5 shadow-sm">
                  <h3 className="text-lg font-extrabold">Map layers</h3>
                  <div className="mt-4 space-y-3">
                    {layers.map(layer => (
                      <label key={layer} className="flex cursor-pointer items-center gap-3 rounded-xl border border-civic-line bg-white/70 p-3 text-sm font-semibold hover:bg-[#f3f0e7]">
                        <input type="checkbox" checked={activeLayers.includes(layer)} onChange={() => toggle(layer)} className="h-4 w-4 accent-civic-orange" />
                        <span>{layer}</span>
                      </label>
                    ))}
                  </div>
                </div>
                <div className="overflow-hidden rounded-3xl border border-civic-line bg-white shadow-civic">
                  <div className="map-grid relative min-h-[430px] bg-[#e9e3d5]">
                    <div className="absolute inset-0 bg-[linear-gradient(135deg,rgba(57,193,161,.20),transparent_32%),linear-gradient(45deg,transparent_58%,rgba(4,65,190,.13)_58%,rgba(4,65,190,.13)_62%,transparent_62%)]"></div>
                    {investments.map((project, index) => (
                      <div key={project} className="absolute rounded-full border-2 border-white bg-civic-ink px-3 py-1 text-xs font-bold text-white shadow-lg" style={{ left: `${12 + (index * 11) % 72}%`, top: `${18 + (index * 17) % 62}%` }}>
                        {index + 1}
                      </div>
                    ))}
                    <div className="absolute bottom-4 left-4 max-w-sm rounded-2xl bg-white p-4 shadow-sm">
                      <p className="text-sm font-extrabold">Styled GIS placeholder</p>
                      <p className="mt-1 text-sm leading-6 text-civic-muted">Future versions could connect these layers to city GIS services, capital improvement records, and program data.</p>
                    </div>
                  </div>
                  <div className="grid gap-3 border-t border-civic-line p-4 md:grid-cols-2">
                    {investments.map((project, index) => (
                      <article key={project} className="rounded-xl bg-[#f3f0e7] p-3">
                        <p className="text-sm font-bold"><span className="mr-2 inline-grid h-6 w-6 place-items-center rounded-full bg-civic-ink text-xs text-white">{index + 1}</span>{project}</p>
                        <p className="mt-2 text-xs font-semibold text-civic-muted">Sample project card - funding, phase, geography, and related indicators can be added.</p>
                      </article>
                    ))}
                  </div>
                </div>
              </div>
            </div>
          </section>
        );
      }

      function CommunityPriorities() {
        return (
          <section id="priorities" className="border-y border-civic-line bg-[#efe9dc]/68 px-4 py-16 sm:px-6 lg:px-8">
            <div className="mx-auto max-w-7xl">
              <SectionHeading eyebrow="Community Priorities" title="From engagement themes to measurable outcomes">
                Community input helped shape the plan's priorities. This tracker shows how those priorities are being translated into actions, investments, and measurable outcomes.
              </SectionHeading>
              <div className="overflow-hidden rounded-3xl border border-civic-line bg-white shadow-civic">
                <div className="hidden grid-cols-3 gap-4 bg-[#f3f0e7] px-5 py-3 text-xs font-extrabold uppercase tracking-wide text-civic-muted md:grid">
                  <span>Engagement Theme</span><span>Related Plan Goal</span><span>Related Indicator</span>
                </div>
                {priorityRows.map(row => (
                  <div key={row[0]} className="grid gap-3 border-t border-civic-line px-5 py-4 text-sm first:border-t-0 md:grid-cols-3">
                    <p className="font-bold">{row[0]}</p>
                    <p className="text-civic-muted">{row[1]}</p>
                    <p className="text-civic-muted">{row[2]}</p>
                  </div>
                ))}
              </div>
            </div>
          </section>
        );
      }

      const methodCards = [
        ["Indicator Definition", "Plain-language definition of what the measure captures and why it was selected."],
        ["Data Source", "Primary source, stewarding agency, and any transformations used in the dashboard."],
        ["Update Frequency", "How often the measure is refreshed, such as annually, quarterly, or when new data is released."],
        ["Geography", "Whether the measure is available citywide, by council district, corridor, or neighborhood area."],
        ["Baseline Year", "The first year used to compare future progress against plan adoption conditions."],
        ["Direction of Desired Change", "Whether the plan expects the value to increase, decrease, or be monitored."],
        ["Limitations", "Known caveats, missing data, confidence issues, or interpretation notes for public users."]
      ];

      function AnnualReports() {
        return (
          <section id="reports" className="px-4 py-16 sm:px-6 lg:px-8">
            <div className="mx-auto max-w-7xl">
              <SectionHeading eyebrow="Annual Reports" title="Progress over time">
                Annual reports summarize completed actions, investments, indicator trends, and areas needing continued attention.
              </SectionHeading>
              <div className="brand-panel rounded-3xl border border-civic-line bg-[#620603] p-6 text-white shadow-civic md:p-8">
                <p className="max-w-5xl text-lg leading-8">
                  In 2027, Omaha completed 18 plan actions, advanced 11 additional actions, and began tracking 42 plan indicators. Progress was strongest in corridor planning, park access, and housing production. Areas requiring continued attention include transit access, housing affordability, infrastructure gaps, and investment in historically underserved neighborhoods.
                </p>
                <div className="mt-6 flex flex-wrap gap-3">
                  {["Download Annual Report", "View Completed Actions", "View Indicators Needing Attention", "View Public Investment Summary"].map(button => (
                    <button key={button} className="rounded-xl bg-white px-4 py-2.5 text-sm font-extrabold text-civic-ink hover:bg-[#f3f0e7]">{button}</button>
                  ))}
                </div>
              </div>
            </div>
          </section>
        );
      }

      function DataMethods() {
        return (
          <section id="methods" className="px-4 py-16 sm:px-6 lg:px-8">
            <div className="mx-auto max-w-7xl">
              <SectionHeading eyebrow="Data & Methods" title="Transparent methodology">
                Each indicator includes an "About this measure" explanation to help residents understand how progress is measured.
              </SectionHeading>
              <div className="mb-6 rounded-3xl border border-civic-line bg-white p-6 shadow-sm">
                <p className="text-xs font-extrabold uppercase tracking-[0.18em] text-civic-ink">About this measure</p>
                <h3 className="mt-2 text-2xl font-black">Infill Development</h3>
                <p className="mt-3 max-w-4xl text-base leading-7 text-civic-muted">
                  Measures the share of new population and employment growth occurring in already developed areas. Higher infill development can support efficient infrastructure use, stronger corridors, more walkable communities, and reduced pressure on undeveloped land.
                </p>
              </div>
              <div className="grid gap-4 md:grid-cols-2 lg:grid-cols-4">
                {methodCards.map(([title, text]) => (
                  <article key={title} className="rounded-2xl border border-civic-line bg-white p-5 shadow-sm">
                    <h3 className="text-base font-extrabold">{title}</h3>
                    <p className="mt-2 text-sm leading-6 text-civic-muted">{text}</p>
                  </article>
                ))}
              </div>
            </div>
          </section>
        );
      }

      function App() {
        const [route, setRoute] = useState(() => parseRouteHash());
        const [globalSearch, setGlobalSearch] = useState(route.params.q || "");
        useEffect(() => {
          const handleHashChange = () => setRoute(parseRouteHash());
          window.addEventListener("hashchange", handleHashChange);
          handleHashChange();
          return () => window.removeEventListener("hashchange", handleHashChange);
        }, []);
        const commitRoute = (section, params = {}) => {
          const hash = buildRouteHash(section, params);
          if (window.location.hash !== hash) {
            window.location.hash = hash;
          } else {
            setRoute({ section, params: cleanRouteParams(params) });
          }
        };
        const navigate = (section, params = {}) => commitRoute(section, params);
        const updateRouteParam = (key, value) => {
          commitRoute(route.section, { ...route.params, [key]: value });
        };
        const activeSection = route.section;
        const sectionComponents = {
          overview: <Overview navigate={navigate} />,
          implementation: <ImplementationTracker search={globalSearch} setSearch={setGlobalSearch} routeParams={route.params} onParamChange={updateRouteParam} />,
          indicators: <IndicatorsDashboard search={globalSearch} setSearch={setGlobalSearch} routeParams={route.params} onParamChange={updateRouteParam} />,
          areas: <ExploreAreas routeParams={route.params} onParamChange={updateRouteParam} />,
          investments: <InvestmentMap routeParams={route.params} onParamChange={updateRouteParam} />,
          priorities: <CommunityPriorities />,
          reports: <AnnualReports />,
          methods: <DataMethods />
        };
        return (
          <div className="flex min-h-screen flex-col">
            <Header activeSection={activeSection} setActiveSection={navigate} />
            <main className="flex-1">
              {sectionComponents[activeSection]}
            </main>
            <footer className="border-t border-civic-line bg-[#620603] px-6 py-[18px] text-center text-[0.85rem] font-semibold leading-5 text-white">
              Omaha Progress Tracker is a sample public-facing implementation dashboard concept for tracking comprehensive plan progress.
            </footer>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
