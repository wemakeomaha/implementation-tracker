            (status === "All" || action.status === status) &&

            (department === "All" || action.department === department);

                <label>
                  <span className="mb-1 block text-xs font-semibold uppercase tracking-wide text-civic-muted">Search</span>
                  <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search indicators" className="focus-ring w-full rounded-xl border border-civic-line px-3 py-2.5 text-sm shadow-sm" />
                </label>
                <Select label="Goal Area" value={goal} setValue={setGoal} options={goals.map(g => g.name)} />
                <Select label="Geography" value={geo} setValue={setGeo} options={["Citywide", "Council District", "Planning District", "Neighborhood Area", "Priority Corridor"]} />
                <Select label="Year" value={year} setValue={setYear} options={["2027", "2026", "2025"]} />
                <Select label="Indicator Status" value={status} setValue={setStatus} options={["Improving", "Stable", "Needs Attention"]} />
              </div>
              <div className="grid gap-4 md:grid-cols-2 xl:grid-cols-3">
                {filtered.map(indicator => (
                  <article key={indicator.name} className="rounded-2xl border border-civic-line bg-white p-5 shadow-sm">
                    <div className="flex items-start justify-between gap-3">
                      <div>
                        <p className="text-xs font-bold uppercase tracking-wide text-civic-blue">{indicator.goal}</p>
                        <h3 className="mt-1 text-lg font-bold leading-6">{indicator.name}</h3>
                      </div>
                      <Badge>{indicator.status}</Badge>
                    </div>
                    <div className="mt-4 flex items-end justify-between">
                      <p className="text-3xl font-black text-civic-ink">{indicator.value}</p>
                      <p className="rounded-lg bg-slate-100 px-2.5 py-1 text-xs font-bold text-civic-muted">{indicator.direction}</p>
                    </div>
                    <div className="mt-4 h-2.5 overflow-hidden rounded-full bg-slate-100">
                      <div className={`h-full rounded-full ${indicator.status === "Needs Attention" ? "bg-civic-red" : indicator.status === "Stable" ? "bg-civic-sky" : "bg-civic-green"}`} style={{ width: `${indicator.progress}%` }}></div>
                    </div>
                    <p className="mt-4 text-sm leading-6 text-civic-muted">{indicator.why}</p>
                    <div className="mt-4 flex flex-wrap items-center gap-2 text-xs font-semibold text-civic-muted">
                      <span className="rounded-full bg-slate-100 px-2.5 py-1">Updated {indicator.year}</span>
                      <span className="rounded-full bg-slate-100 px-2.5 py-1">Related plan goal</span>
                    </div>
                  </article>
                ))}
              </div>
            </div>
          </section>
        );
      }

      function ExploreAreas() {
        const [geoType, setGeoType] = useState("Neighborhood Area");
        return (
          <section id="areas" className="border-y border-civic-line bg-white/70 px-4 py-16 sm:px-6 lg:px-8">
            <div className="mx-auto max-w-7xl">
              <SectionHeading eyebrow="Explore by Area" title="See who and what areas are benefiting">
                Geography helps residents understand how plan actions and public investments are showing up in different parts of Omaha.
              </SectionHeading>
              <div className="mb-6 flex flex-wrap justify-center gap-2">
                {["Citywide", "City Council District", "Planning District", "Neighborhood Area", "Priority Corridor", "Historically Underserved Area"].map(type => (
                  <button key={type} onClick={() => setGeoType(type)} className={`rounded-full px-4 py-2 text-sm font-bold ring-1 ${geoType === type ? "bg-civic-blue text-white ring-civic-blue" : "bg-white text-civic-muted ring-civic-line"}`}>{type}</button>
                ))}
              </div>
              <div className="grid gap-4 md:grid-cols-2 xl:grid-cols-3">
                {areaProfiles.map(area => (
                  <article key={area.name} className="rounded-2xl border border-civic-line bg-white p-5 shadow-sm">
                    <div className="flex items-start justify-between gap-3">
                      <h3 className="text-xl font-black">{area.name}</h3>
                      <span className="rounded-full bg-slate-100 px-2.5 py-1 text-xs font-bold text-civic-muted">{geoType}</span>
                    </div>
                    <dl className="mt-5 space-y-4 text-sm leading-6">
                      <div><dt className="font-bold text-civic-ink">Key priorities from engagement</dt><dd className="mt-1 text-civic-muted">{area.priorities}</dd></div>
                      <div><dt className="font-bold text-civic-ink">Current projects</dt><dd className="mt-1 text-civic-muted">{area.projects}</dd></div>
                      <div><dt className="font-bold text-civic-ink">Key indicators</dt><dd className="mt-1 text-civic-muted">{area.indicators}</dd></div>
                    </dl>
                    <div className="mt-5 rounded-xl bg-slate-50 p-3 text-sm font-bold text-civic-blue">Progress status: {area.status}</div>
                  </article>
                ))}
              </div>
            </div>
          </section>
        );
      }

      function InvestmentMap() {
        const layers = ["Capital Improvement Projects", "Housing Investments", "Transportation Projects", "Parks and Public Space Projects", "Economic Development Projects", "Planning Initiatives", "Priority Corridors", "Historically Underserved Areas"];
        const [activeLayers, setActiveLayers] = useState(layers.slice(0, 4));
        const toggle = layer => setActiveLayers(prev => prev.includes(layer) ? prev.filter(item => item !== layer) : [...prev, layer]);
        return (
          <section id="investments" className="px-4 py-16 sm:px-6 lg:px-8">
            <div className="mx-auto max-w-7xl">
              <SectionHeading eyebrow="Investment Map" title="Where public resources are going">
                Public investments connect adopted plan priorities to capital projects, housing programs, corridor work, and neighborhood improvements.
              </SectionHeading>
              <div className="grid gap-6 lg:grid-cols-[0.72fr_1.28fr]">
                <div className="rounded-3xl border border-civic-line bg-white p-5 shadow-sm">
                  <h3 className="text-lg font-bold">Map layers</h3>
                  <div className="mt-4 space-y-3">
                    {layers.map(layer => (
                      <label key={layer} className="flex cursor-pointer items-center gap-3 rounded-xl border border-civic-line p-3 text-sm font-semibold hover:bg-slate-50">
                        <input type="checkbox" checked={activeLayers.includes(layer)} onChange={() => toggle(layer)} className="h-4 w-4 accent-civic-blue" />
                        <span>{layer}</span>
                      </label>
                    ))}
                  </div>
                </div>
                <div className="overflow-hidden rounded-3xl border border-civic-line bg-white shadow-civic">
                  <div className="map-grid relative min-h-[430px] bg-[#e8f0ed]">
                    <div className="absolute inset-0 bg-[linear-gradient(135deg,rgba(63,125,88,.18),transparent_32%),linear-gradient(45deg,transparent_58%,rgba(34,87,122,.17)_58%,rgba(34,87,122,.17)_62%,transparent_62%)]"></div>
                    {investments.map((project, index) => (
                      <div key={project} className="absolute rounded-full border-2 border-white bg-civic-blue px-3 py-1 text-xs font-bold text-white shadow-lg" style={{ left: `${12 + (index * 11) % 72}%`, top: `${18 + (index * 17) % 62}%` }}>
                        {index + 1}
                      </div>
                    ))}
                    <div className="absolute bottom-4 left-4 max-w-sm rounded-2xl bg-white/92 p-4 shadow-sm">
                      <p className="text-sm font-bold">Styled GIS placeholder</p>
                      <p className="mt-1 text-sm leading-6 text-civic-muted">Future versions could connect these layers to city GIS services, capital improvement records, and program data.</p>
                    </div>
                  </div>
                  <div className="grid gap-3 border-t border-civic-line p-4 md:grid-cols-2">
                    {investments.map((project, index) => (
                      <article key={project} className="rounded-xl bg-slate-50 p-3">
                        <p className="text-sm font-bold"><span className="mr-2 inline-grid h-6 w-6 place-items-center rounded-full bg-civic-blue text-xs text-white">{index + 1}</span>{project}</p>
                        <p className="mt-2 text-xs font-semibold text-civic-muted">Sample project card - funding, phase, geography, and related indicators can be added.</p>
                      </article>
                    ))}
                  </div>
                </div>
              </div>
            </div>
          </section>
        );
      }

      function CommunityPriorities() {
        return (
          <section id="priorities" className="border-y border-civic-line bg-white/70 px-4 py-16 sm:px-6 lg:px-8">
            <div className="mx-auto max-w-7xl">
              <SectionHeading eyebrow="Community Priorities" title="From engagement themes to measurable outcomes">
                Community input helped shape the plan's priorities. This tracker shows how those priorities are being translated into actions, investments, and measurable outcomes.
              </SectionHeading>
              <div className="overflow-hidden rounded-3xl border border-civic-line bg-white shadow-civic">
                <div className="hidden grid-cols-3 gap-4 bg-slate-100 px-5 py-3 text-xs font-bold uppercase tracking-wide text-civic-muted md:grid">
                  <span>Engagement Theme</span><span>Related Plan Goal</span><span>Related Indicator</span>
                </div>
                {priorityRows.map(row => (
                  <div key={row[0]} className="grid gap-3 border-t border-civic-line px-5 py-4 text-sm first:border-t-0 md:grid-cols-3">
                    <p className="font-bold">{row[0]}</p>
                    <p className="text-civic-muted">{row[1]}</p>
                    <p className="text-civic-muted">{row[2]}</p>
                  </div>
                ))}
              </div>
            </div>
          </section>
        );
      }

      function ReportsAndMethods() {
        const methods = [
          ["Indicator Definition", "Plain-language definition of what the measure captures and why it was selected."],
          ["Data Source", "Primary source, stewarding agency, and any transformations used in the dashboard."],
          ["Update Frequency", "How often the measure is refreshed, such as annually, quarterly, or when new data is released."],
          ["Geography", "Whether the measure is available citywide, by council district, planning district, corridor, or neighborhood area."],
          ["Baseline Year", "The first year used to compare future progress against plan adoption conditions."],
          ["Direction of Desired Change", "Whether the plan expects the value to increase, decrease, or be monitored."],
          ["Limitations", "Known caveats, missing data, confidence issues, or interpretation notes for public users."]
        ];
        return (
          <>
            <section id="reports" className="px-4 py-16 sm:px-6 lg:px-8">
              <div className="mx-auto max-w-7xl">
                <SectionHeading eyebrow="Annual Reports" title="Progress over time">
                  Annual reports summarize completed actions, investments, indicator trends, and areas needing continued attention.
                </SectionHeading>
                <div className="rounded-3xl border border-civic-line bg-civic-ink p-6 text-white shadow-civic md:p-8">
                  <p className="max-w-5xl text-lg leading-8">
                    In 2027, Omaha completed 18 plan actions, advanced 11 additional actions, and began tracking 42 plan indicators. Progress was strongest in corridor planning, park access, and housing production. Areas requiring continued attention include transit access, housing affordability, infrastructure gaps, and investment in historically underserved neighborhoods.
                  </p>
                  <div className="mt-6 flex flex-wrap gap-3">
                    {["Download Annual Report", "View Completed Actions", "View Indicators Needing Attention", "View Public Investment Summary"].map(button => (
                      <button key={button} className="rounded-xl bg-white px-4 py-2.5 text-sm font-bold text-civic-ink hover:bg-slate-100">{button}</button>
                    ))}
                  </div>
                </div>
              </div>
            </section>
            <section id="methods" className="border-t border-civic-line bg-white/70 px-4 py-16 sm:px-6 lg:px-8">
              <div className="mx-auto max-w-7xl">
                <SectionHeading eyebrow="Data & Methods" title="Transparent methodology">
                  Each indicator includes an "About this measure" explanation to help residents understand how progress is measured.
                </SectionHeading>
                <div className="mb-6 rounded-3xl border border-civic-line bg-white p-6 shadow-sm">
                  <p className="text-xs font-bold uppercase tracking-[0.18em] text-civic-blue">About this measure</p>
                  <h3 className="mt-2 text-2xl font-black">Infill Development</h3>
                  <p className="mt-3 max-w-4xl text-base leading-7 text-civic-muted">
                    Measures the share of new population and employment growth occurring in already developed areas. Higher infill development can support efficient infrastructure use, stronger corridors, more walkable communities, and reduced pressure on undeveloped land.
                  </p>
                </div>
                <div className="grid gap-4 md:grid-cols-2 lg:grid-cols-4">
                  {methods.map(([title, text]) => (
                    <article key={title} className="rounded-2xl border border-civic-line bg-white p-5 shadow-sm">
                      <h3 className="text-base font-bold">{title}</h3>
                      <p className="mt-2 text-sm leading-6 text-civic-muted">{text}</p>
                    </article>
                  ))}
                </div>
              </div>
            </section>
          </>
        );
      }

      function App() {
        const [globalSearch, setGlobalSearch] = useState("");
        return (
          <>
            <Header />
            <main>
              <Overview />
              <ImplementationTracker search={globalSearch} setSearch={setGlobalSearch} />
              <IndicatorsDashboard search={globalSearch} setSearch={setGlobalSearch} />
              <ExploreAreas />
              <InvestmentMap />
              <CommunityPriorities />
              <ReportsAndMethods />
            </main>
            <footer className="border-t border-civic-line bg-civic-ink px-4 py-8 text-center text-sm font-medium text-slate-200 sm:px-6 lg:px-8">
              Omaha Progress Tracker is a sample public-facing implementation dashboard concept for tracking comprehensive plan progress.
            </footer>
          </>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
